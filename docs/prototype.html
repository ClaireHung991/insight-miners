document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Instrument Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"0e24f53b-41a7-47d8-94ba-acd9a01328eb\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Instrument Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"c9882dfc-78da-48d8-bb64-f63d8fb6179e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Instrument Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"0e24f53b-41a7-47d8-94ba-acd9a01328eb\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Instrument Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"c9882dfc-78da-48d8-bb64-f63d8fb6179e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box}\n  body{margin:0;background:#f4f4f2;font-family:'Instrument Sans',system-ui,sans-serif;color:#1c1c1a;-webkit-font-smoothing:antialiased}\n  input::placeholder,textarea::placeholder{color:#b3b3ac}\n  @keyframes dc-spin{to{transform:rotate(360deg)}}\n  @keyframes dc-rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n<div style=\"max-width:660px;margin:0 auto;padding:44px 20px 72px\">\n\n  <div style=\"margin:0 0 22px\">\n    <div style=\"font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#9a9a90\">Product Discovery<\u002Fdiv>\n    <h1 style=\"font-size:26px;font-weight:600;letter-spacing:-.01em;margin:6px 0 6px\">New request<\u002Fh1>\n    <p style=\"font-size:14px;line-height:1.5;color:#6d6d64;margin:0;max-width:52ch\">Pick what you need. Choose research, an interview transcript, or both — and optionally opt in to a recommendation. Each section opens when you check it.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ============ REQUEST A · REPORT ============ -->\n  <div style=\"background:#fff;border:1px solid #e6e6e2;border-radius:12px;margin:0 0 14px;overflow:hidden\">\n    <div onclick=\"{{ toggleReport }}\" style=\"display:flex;align-items:flex-start;gap:12px;padding:16px 18px;cursor:pointer;user-select:none\">\n      <div style=\"{{ reportBox }}\">✓<\u002Fdiv>\n      <div style=\"min-width:0\">\n        <div style=\"font-size:14.5px;font-weight:600\">Request A · Online Research<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#7d7d73;margin-top:2px\">Research a topic and get a written brief.<\u002Fdiv>\n      <\u002Fdiv>\n      <span style=\"margin-left:auto;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#8a8a80;background:#f3f3ef;padding:3px 8px;border-radius:5px;flex:none\">Report<\u002Fspan>\n    <\u002Fdiv>\n    <sc-if value=\"{{ want_report }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:16px 18px 18px 50px;border-top:1px solid #f0f0ea;animation:dc-rise .18s ease\">\n        <label style=\"display:block;font-size:12.5px;font-weight:600;color:#37372f;margin:0 0 6px\">Topic <span style=\"color:#c9463f\">*<\u002Fspan><\u002Flabel>\n        <input value=\"{{ topic }}\" oninput=\"{{ onTopic }}\" placeholder=\"What do you want researched? Be specific — e.g. 'AI code review tools for enterprise dev teams' rather than 'AI tools'.\" style=\"width:100%;padding:9px 11px;border:1px solid #dcdcd6;border-radius:8px;font-size:13.5px;color:#1c1c1a;background:#fff;font-family:inherit;outline:none\" style-focus=\"border-color:#3f5fd0;box-shadow:0 0 0 3px rgba(63,95,208,.12)\">\n        <sc-if value=\"{{ errTopic }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:12px;color:#c9463f;margin:7px 0 0;display:flex;gap:6px;align-items:center\">⚠ {{ errTopic }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-for list=\"{{ reportClars }}\" as=\"c\" hint-placeholder-count=\"0\">\n          <div style=\"margin:14px 0 0;padding:12px 13px;background:#f7f8fd;border:1px solid #dde3f7;border-radius:9px;animation:dc-rise .2s ease\">\n            <div style=\"font-size:12.5px;color:#3a4a86;font-weight:500;margin:0 0 7px\">A couple more details will help: {{ c.q }}<\u002Fdiv>\n            <input value=\"{{ c.value }}\" oninput=\"{{ c.onInput }}\" placeholder=\"Your answer\" style=\"width:100%;padding:8px 10px;border:1px solid #c8d1ee;border-radius:7px;font-size:13px;background:#fff;font-family:inherit;outline:none\" style-focus=\"border-color:#3f5fd0\">\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- ============ REQUEST B · TRANSCRIPT ============ -->\n  <div style=\"background:#fff;border:1px solid #e6e6e2;border-radius:12px;margin:0 0 14px;overflow:hidden\">\n    <div onclick=\"{{ toggleTranscript }}\" style=\"display:flex;align-items:flex-start;gap:12px;padding:16px 18px;cursor:pointer;user-select:none\">\n      <div style=\"{{ transBox }}\">✓<\u002Fdiv>\n      <div style=\"min-width:0\">\n        <div style=\"font-size:14.5px;font-weight:600\">Request B · Interview Transcription<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#7d7d73;margin-top:2px\">Upload audio or a text file — we format a clean transcript.<\u002Fdiv>\n      <\u002Fdiv>\n      <span style=\"margin-left:auto;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#8a8a80;background:#f3f3ef;padding:3px 8px;border-radius:5px;flex:none\">Transcript<\u002Fspan>\n    <\u002Fdiv>\n    <sc-if value=\"{{ want_transcript }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:16px 18px 18px 50px;border-top:1px solid #f0f0ea;animation:dc-rise .18s ease\">\n\n        <!-- upload -->\n        <label style=\"display:block;font-size:12.5px;font-weight:600;color:#37372f;margin:0 0 6px\">Input file <span style=\"color:#c9463f\">*<\u002Fspan><\u002Flabel>\n        <sc-if value=\"{{ filePresent }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;align-items:center;gap:12px;padding:12px 13px;border:1px solid #dcdcd6;border-radius:9px;background:#fafafa\">\n            <div style=\"width:34px;height:34px;border-radius:7px;background:#eef1fb;color:#3f5fd0;display:flex;align-items:center;justify-content:center;font-size:15px;flex:none\">{{ fileIcon }}<\u002Fdiv>\n            <div style=\"min-width:0;flex:1\">\n              <div style=\"font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ fileName }}<\u002Fdiv>\n              <div style=\"font-size:11.5px;color:#8a8a80;margin-top:1px\">{{ fileMeta }}<\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ removeFile }}\" style=\"border:none;background:none;color:#9a9a90;font-size:12px;cursor:pointer;padding:6px;font-family:inherit\" style-hover=\"color:#c9463f\">Remove<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noFile }}\" hint-placeholder-val=\"{{ true }}\">\n          <label style=\"display:block;border:1.5px dashed #d4d4cc;border-radius:9px;padding:16px;text-align:center;cursor:pointer;background:#fcfcfb\" style-hover=\"border-color:#3f5fd0;background:#f8f9fd\">\n            <input type=\"file\" accept=\".mp3,.wav,.m4a,.txt\" onchange=\"{{ onRealFile }}\" style=\"display:none\">\n            <div style=\"font-size:13px;font-weight:600;color:#3f5fd0\">Click to upload<\u002Fdiv>\n            <div style=\"font-size:11.5px;color:#9a9a90;margin-top:3px\">Audio (.mp3, .wav, .m4a) or text (.txt) · max 40 MB<\u002Fdiv>\n          <\u002Flabel>\n          <div style=\"display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:9px 0 0\">\n            <span style=\"font-size:11px;color:#a5a59b\">or try a sample:<\u002Fspan>\n            <sc-for list=\"{{ samples }}\" as=\"s\" hint-placeholder-count=\"5\">\n              <button onclick=\"{{ s.onPick }}\" style=\"font-size:11px;font-family:inherit;color:#5a5a50;background:#f1f1ec;border:1px solid #e4e4dc;border-radius:20px;padding:4px 10px;cursor:pointer\" style-hover=\"border-color:#c4c4ba;background:#eaeae3\">{{ s.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ errFile }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:12px;color:#c9463f;margin:7px 0 0;display:flex;gap:6px;align-items:flex-start\">⚠ <span>{{ errFile }}<\u002Fspan><\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- purpose -->\n        <div style=\"margin:16px 0 0\">\n          <label style=\"display:block;font-size:12.5px;font-weight:600;color:#37372f;margin:0 0 6px\">Interview purpose <span style=\"color:#c9463f\">*<\u002Fspan><\u002Flabel>\n          <input value=\"{{ interview_purpose }}\" oninput=\"{{ onPurpose }}\" placeholder=\"e.g. Understand why trial users churn before day 7\" style=\"width:100%;padding:9px 11px;border:1px solid #dcdcd6;border-radius:8px;font-size:13.5px;background:#fff;font-family:inherit;outline:none\" style-focus=\"border-color:#3f5fd0;box-shadow:0 0 0 3px rgba(63,95,208,.12)\">\n          <sc-if value=\"{{ errPurpose }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:12px;color:#c9463f;margin:7px 0 0;display:flex;gap:6px;align-items:center\">⚠ {{ errPurpose }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <!-- context -->\n        <div style=\"margin:16px 0 0\">\n          <label style=\"display:block;font-size:12.5px;font-weight:600;color:#37372f;margin:0 0 6px\">Business context <span style=\"color:#c9463f\">*<\u002Fspan><\u002Flabel>\n          <textarea value=\"{{ business_context }}\" oninput=\"{{ onContext }}\" rows=\"3\" placeholder=\"Company, product, stage — anything that helps us format the transcript well.\" style=\"width:100%;padding:9px 11px;border:1px solid #dcdcd6;border-radius:8px;font-size:13.5px;background:#fff;font-family:inherit;outline:none;resize:vertical\" style-focus=\"border-color:#3f5fd0;box-shadow:0 0 0 3px rgba(63,95,208,.12)\"><\u002Ftextarea>\n          <sc-if value=\"{{ errContext }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:12px;color:#c9463f;margin:7px 0 0;display:flex;gap:6px;align-items:center\">⚠ {{ errContext }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <!-- soft fields row -->\n        <div style=\"display:flex;gap:12px;margin:16px 0 0\">\n          <div style=\"flex:1\">\n            <label style=\"display:block;font-size:12.5px;font-weight:600;color:#37372f;margin:0 0 6px\">Participants <span style=\"font-weight:400;color:#a5a59b\">· optional<\u002Fspan><\u002Flabel>\n            <input type=\"number\" min=\"0\" value=\"{{ participant_count }}\" oninput=\"{{ onCount }}\" placeholder=\"e.g. 8\" style=\"width:100%;padding:9px 11px;border:1px solid #dcdcd6;border-radius:8px;font-size:13.5px;background:#fff;font-family:inherit;outline:none\" style-focus=\"border-color:#3f5fd0;box-shadow:0 0 0 3px rgba(63,95,208,.12)\">\n          <\u002Fdiv>\n          <div style=\"flex:2\">\n            <label style=\"display:block;font-size:12.5px;font-weight:600;color:#37372f;margin:0 0 6px\">Project goals <span style=\"font-weight:400;color:#a5a59b\">· optional<\u002Fspan><\u002Flabel>\n            <input value=\"{{ project_goals }}\" oninput=\"{{ onGoals }}\" placeholder=\"What decision will this inform?\" style=\"width:100%;padding:9px 11px;border:1px solid #dcdcd6;border-radius:8px;font-size:13.5px;background:#fff;font-family:inherit;outline:none\" style-focus=\"border-color:#3f5fd0;box-shadow:0 0 0 3px rgba(63,95,208,.12)\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- mindmap sub-option -->\n        <div onclick=\"{{ toggleMindmap }}\" style=\"display:flex;align-items:center;gap:10px;margin:16px 0 0;padding:11px 13px;border:1px solid #ece7db;border-radius:9px;background:#fbf9f2;cursor:pointer;user-select:none\">\n          <div style=\"{{ mindBox }}\">✓<\u002Fdiv>\n          <div>\n            <div style=\"font-size:13px;font-weight:600;color:#4a4534\">Also generate a Miro mind map<\u002Fdiv>\n            <div style=\"font-size:11.5px;color:#9a9075;margin-top:1px\">Add-on · visual map of the interview themes<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- transcript clarifications -->\n        <sc-for list=\"{{ transClars }}\" as=\"c\" hint-placeholder-count=\"0\">\n          <div style=\"margin:14px 0 0;padding:12px 13px;background:#f7f8fd;border:1px solid #dde3f7;border-radius:9px;animation:dc-rise .2s ease\">\n            <div style=\"font-size:12.5px;color:#3a4a86;font-weight:500;margin:0 0 7px\">A couple more details will help: {{ c.q }}<\u002Fdiv>\n            <input value=\"{{ c.value }}\" oninput=\"{{ c.onInput }}\" placeholder=\"Your answer\" style=\"width:100%;padding:8px 10px;border:1px solid #c8d1ee;border-radius:7px;font-size:13px;background:#fff;font-family:inherit;outline:none\" style-focus=\"border-color:#3f5fd0\">\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- ============ REQUEST C · RECOMMENDATION ============ -->\n  <div style=\"background:#fff;border:1px solid #e6e6e2;border-radius:12px;margin:0 0 14px;overflow:hidden;{{ recCardDim }}\">\n    <div onclick=\"{{ toggleRec }}\" style=\"{{ recRowStyle }}\">\n      <div style=\"{{ recBox }}\">✓<\u002Fdiv>\n      <div style=\"min-width:0\">\n        <div style=\"font-size:14.5px;font-weight:600\">Request C · Recommendation<\u002Fdiv>\n        <sc-if value=\"{{ recDisabled }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"font-size:12.5px;color:#a5a59b;margin-top:2px\">🔒 Requires Report or Transcript<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ recEnabled }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:12.5px;color:#7d7d73;margin-top:2px\">An advisor summary built on what you requested above.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <span style=\"margin-left:auto;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#8a8a80;background:#f3f3ef;padding:3px 8px;border-radius:5px;flex:none\">Opt-in<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ SUBMIT ============ -->\n  <div style=\"display:flex;align-items:center;gap:14px;margin:20px 0 0\">\n    <button onclick=\"{{ onSubmit }}\" disabled=\"{{ submitDisabled }}\" title=\"{{ submitTitle }}\" style=\"{{ submitStyle }}\">{{ submitLabel }}<\u002Fbutton>\n    <span style=\"font-size:12px;color:#a5a59b\">{{ submitHint }}<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- ============ RESULTS ============ -->\n  <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n    <div ref=\"{{ resultsRef }}\" style=\"margin:34px 0 0;animation:dc-rise .25s ease\">\n      <div style=\"display:flex;align-items:baseline;gap:10px;margin:0 0 4px\">\n        <h2 style=\"font-size:18px;font-weight:600;margin:0\">Results<\u002Fh2>\n        <span style=\"font-size:12px;color:#a5a59b\">Form stays editable above — resubmit anytime.<\u002Fspan>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ softBanner }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin:12px 0 0;padding:11px 13px;background:#fbf6ea;border:1px solid #ecdfc0;border-radius:9px;font-size:12.5px;color:#8a6d2a;display:flex;gap:8px\">ℹ <span>Proceeding with what you provided — some details were inferred and will be flagged in the output.<\u002Fspan><\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"margin:14px 0 0;display:flex;flex-direction:column;gap:10px\">\n        <sc-for list=\"{{ artifacts }}\" as=\"a\" hint-placeholder-count=\"2\">\n          <div style=\"background:#fff;border:1px solid #e6e6e2;border-radius:11px;padding:15px 16px\">\n            <div style=\"display:flex;align-items:center;gap:13px\">\n              <div style=\"width:36px;height:36px;border-radius:8px;background:#f2f2ee;display:flex;align-items:center;justify-content:center;font-size:16px;flex:none\">{{ a.icon }}<\u002Fdiv>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"font-size:13.5px;font-weight:600\">{{ a.label }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:#8a8a80;margin-top:1px\">{{ a.desc }}<\u002Fdiv>\n              <\u002Fdiv>\n              <!-- status -->\n              <sc-if value=\"{{ a.isGen }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display:flex;align-items:center;gap:7px;font-size:12.5px;color:#8a8a80\">\n                  <span style=\"width:14px;height:14px;border:2px solid #dcdcd6;border-top-color:#3f5fd0;border-radius:50%;display:inline-block;animation:dc-spin .7s linear infinite\"><\u002Fspan>\n                  Generating…\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ a.isReady }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;align-items:center;gap:10px\">\n                  <span style=\"display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#2f8a58\"><span style=\"width:7px;height:7px;border-radius:50%;background:#2f8a58\"><\u002Fspan>Ready<\u002Fspan>\n                  <button onclick=\"{{ a.onAction }}\" style=\"font-size:12.5px;font-weight:600;font-family:inherit;color:#3f5fd0;background:#eef1fb;border:1px solid #d8def6;border-radius:7px;padding:6px 11px;cursor:pointer\" style-hover=\"background:#e4e9fa\">{{ a.actionText }}<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ a.isFailed }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;align-items:center;gap:10px\">\n                  <span style=\"display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#c9463f\"><span style=\"width:7px;height:7px;border-radius:50%;background:#c9463f\"><\u002Fspan>Failed<\u002Fspan>\n                  <button onclick=\"{{ a.onRetry }}\" style=\"font-size:12.5px;font-weight:600;font-family:inherit;color:#5a5a50;background:#f1f1ec;border:1px solid #e0e0d8;border-radius:7px;padding:6px 11px;cursor:pointer\" style-hover=\"background:#eaeae3\">{{ a.retryText }}<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <sc-if value=\"{{ a.showFailNote }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-size:11.5px;color:#a58a55;margin:10px 0 0 49px;background:#fbf6ea;border-radius:7px;padding:7px 10px\">The mind map couldn't be created — this doesn't affect your other artifacts.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"font-size:11.5px;color:#b0b0a6;margin:14px 0 0\">Results reset on refresh — active runs are in-memory only, nothing is stored.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ PROTOTYPE HINTS ============ -->\n  <sc-if value=\"{{ showHints }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"margin:38px 0 0;padding:15px 17px;border:1px dashed #d8d8d0;border-radius:11px;background:#fbfbf9\">\n      <div style=\"font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#a5a59b;margin:0 0 9px\">Prototype — things to try<\u002Fdiv>\n      <ul style=\"margin:0;padding:0 0 0 17px;font-size:12.5px;line-height:1.7;color:#6d6d64\">\n        <li>Uncheck both Report &amp; Transcript → submit disables (hover it) and Recommendation locks.<\u002Fli>\n        <li>Check Transcript → the Miro mind-map add-on appears nested inside it.<\u002Fli>\n        <li>Pick the 52 MB or the .pdf sample file → size / type errors.<\u002Fli>\n        <li>Shorten the Report topic to one or two words, then submit → an inline clarification is appended.<\u002Fli>\n        <li>Submit → artifacts stream in below; the mind map fails with its own independent retry.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:900},&quot;resultsSpeed&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;normal&quot;,&quot;fast&quot;],&quot;default&quot;:&quot;normal&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Demo&quot;,&quot;label&quot;:&quot;Result speed&quot;},&quot;artifactDemo&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;mixed&quot;,&quot;all-ready&quot;],&quot;default&quot;:&quot;mixed&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Demo&quot;,&quot;label&quot;:&quot;Artifact outcome&quot;},&quot;hints&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Demo&quot;,&quot;label&quot;:&quot;Show prototype hints&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    want_report: true,\n    want_transcript: false,\n    want_recommendation: false,\n    want_mindmap: false,\n    topic: 'AI code review tools for enterprise dev teams',\n    file: null,\n    fileError: '',\n    interview_purpose: '',\n    business_context: '',\n    participant_count: '',\n    project_goals: '',\n    showErrors: false,\n    submitted: false,\n    softBanner: false,\n    pendingClar: [],\n    clarValues: {},\n    clarRound: 0,\n    artifacts: {},\n  };\n\n  timers = [];\n  componentWillUnmount() { this.timers.forEach(clearTimeout); }\n\n  // ---- toggles ----\n  toggleReport = () => this.setState(s => {\n    const want_report = !s.want_report;\n    const keepRec = want_report || s.want_transcript;\n    return { want_report, want_recommendation: keepRec ? s.want_recommendation : false };\n  });\n  toggleTranscript = () => this.setState(s => {\n    const want_transcript = !s.want_transcript;\n    const keepRec = s.want_report || want_transcript;\n    return {\n      want_transcript,\n      want_mindmap: want_transcript ? s.want_mindmap : false,\n      want_recommendation: keepRec ? s.want_recommendation : false,\n    };\n  });\n  toggleRec = () => {\n    if (!(this.state.want_report || this.state.want_transcript)) return;\n    this.setState(s => ({ want_recommendation: !s.want_recommendation }));\n  };\n  toggleMindmap = () => this.setState(s => ({ want_mindmap: !s.want_mindmap }));\n\n  // ---- field inputs ----\n  onTopic = e => this.setState({ topic: e.target.value });\n  onPurpose = e => this.setState({ interview_purpose: e.target.value });\n  onContext = e => this.setState({ business_context: e.target.value });\n  onCount = e => this.setState({ participant_count: e.target.value });\n  onGoals = e => this.setState({ project_goals: e.target.value });\n\n  // ---- file handling ----\n  checkFile(name, sizeMB) {\n    const ext = (name.split('.').pop() || '').toLowerCase();\n    const isTxt = ext === 'txt';\n    const isAudio = ['mp3', 'wav', 'm4a'].includes(ext);\n    if (!isTxt && !isAudio) return { error: 'Unsupported file type. Upload an audio file (.mp3, .wav, .m4a) or a text file (.txt).' };\n    if (sizeMB > 40) return { error: 'File is too large (max 40 MB).' };\n    if (sizeMB <= 0) return { error: 'This file appears to be empty or unreadable — try uploading again.' };\n    return { file: { name, sizeMB, kind: isTxt ? 'text' : 'audio' } };\n  }\n  applyFile(name, sizeMB) {\n    const r = this.checkFile(name, sizeMB);\n    if (r.error) this.setState({ file: null, fileError: r.error });\n    else this.setState({ file: r.file, fileError: '' });\n  }\n  onRealFile = e => {\n    const f = e.target.files && e.target.files[0];\n    if (!f) return;\n    this.applyFile(f.name, f.size / (1024 * 1024));\n  };\n  removeFile = () => this.setState({ file: null, fileError: '' });\n\n  fmtSize(mb) {\n    if (mb <= 0) return '0 KB';\n    if (mb < 1) return Math.round(mb * 1000) + ' KB';\n    return (Number.isInteger(mb) ? mb : mb.toFixed(1)) + ' MB';\n  }\n\n  // ---- validation (Tier 1) ----\n  tier1() {\n    const s = this.state, e = {};\n    if (s.want_report && !s.topic.trim()) e.topic = 'Add a topic to research.';\n    if (s.want_transcript) {\n      if (!s.file) e.file = 'Upload an audio or text file.';\n      if (!s.interview_purpose.trim()) e.purpose = \"Tell us the interview's purpose — this helps format it well.\";\n      if (!s.business_context.trim()) e.context = 'Add some background context (company, product, etc.).';\n    }\n    return e;\n  }\n\n  // ---- submit ----\n  onSubmit = () => {\n    const s = this.state;\n    if (!(s.want_report || s.want_transcript)) return; // button is disabled anyway\n    const e = this.tier1();\n    if (Object.keys(e).length) { this.setState({ showErrors: true }); return; }\n\n    // Tier 2 semantic check (mocked)\n    const hard = [], soft = [];\n    if (s.want_report) {\n      const words = s.topic.trim().split(/\\s+/).filter(Boolean).length;\n      if (words > 0 && words < 4 && !(s.clarValues.report_focus || '').trim())\n        hard.push({ key: 'report_focus', section: 'report', q: 'which audience or use case should we prioritize? (e.g. \"enterprise security teams\")' });\n    }\n    if (s.want_transcript) {\n      if (s.business_context.trim().length < 12 && !(s.clarValues.context_more || '').trim())\n        hard.push({ key: 'context_more', section: 'transcript', q: \"what's the company or product, and roughly what stage is it at?\" });\n      if (!String(s.participant_count).trim()) soft.push('participant count');\n      if (!s.project_goals.trim()) soft.push('project goals');\n    }\n\n    if (hard.length && s.clarRound < 2) {\n      this.setState({ pendingClar: hard, clarRound: s.clarRound + 1, showErrors: false });\n      return;\n    }\n    this.startResults(soft.length > 0);\n  };\n\n  onClar = key => e => this.setState(s => ({ clarValues: { ...s.clarValues, [key]: e.target.value } }));\n\n  // ---- results ----\n  speed() { return (this.props.resultsSpeed === 'fast') ? 0.4 : 1; }\n\n  startResults(soft) {\n    const s = this.state;\n    const init = {};\n    const req = [];\n    if (s.want_report) req.push('report');\n    if (s.want_transcript) req.push('transcript');\n    if (s.want_mindmap) req.push('mindmap');\n    if (s.want_recommendation) req.push('recommendation');\n    req.forEach(k => init[k] = { state: 'generating' });\n\n    this.timers.forEach(clearTimeout); this.timers = [];\n    this.setState({ submitted: true, softBanner: soft, pendingClar: [], artifacts: init });\n\n    const m = this.speed();\n    const mindFails = (this.props.artifactDemo !== 'all-ready');\n    const set = (k, st, d) => this.timers.push(setTimeout(() =>\n      this.setState(st2 => ({ artifacts: { ...st2.artifacts, [k]: { state: st } } })), d * m));\n    if (s.want_report) set('report', 'ready', 1800);\n    if (s.want_transcript) set('transcript', 'ready', 2500);\n    if (s.want_mindmap) set('mindmap', mindFails ? 'failed' : 'ready', 2100);\n    if (s.want_recommendation) set('recommendation', 'ready', 3000);\n\n    this.timers.push(setTimeout(() => {\n      if (this.resultsEl) window.scrollTo({ top: this.resultsEl.getBoundingClientRect().top + window.scrollY - 24, behavior: 'smooth' });\n    }, 70));\n  }\n\n  retry = key => () => {\n    this.setState(s => ({ artifacts: { ...s.artifacts, [key]: { state: 'generating' } } }));\n    const m = this.speed();\n    this.timers.push(setTimeout(() =>\n      this.setState(s => ({ artifacts: { ...s.artifacts, [key]: { state: 'ready' } } })), 1600 * m));\n  };\n\n  download(key, label) {\n    if (key === 'mindmap') { window.open('https://miro.com', '_blank'); return; }\n    const md = '# ' + label + '\\n\\nPrototype artifact generated for: \"' + (this.state.topic || 'your request') + '\".\\n\\n_(Demo file — not real output.)_\\n';\n    const blob = new Blob([md], { type: 'text/markdown' });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    a.href = url; a.download = label.toLowerCase().replace(/[^a-z0-9]+/g, '-') + '.md';\n    document.body.appendChild(a); a.click(); a.remove();\n    setTimeout(() => URL.revokeObjectURL(url), 1000);\n  }\n\n  // ---- checkbox styling ----\n  box(checked, disabled) {\n    const base = { width: '20px', height: '20px', borderRadius: '6px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '12px', fontWeight: 700, flex: 'none', border: '1.5px solid', marginTop: '1px', transition: 'all .15s' };\n    if (disabled) return { ...base, borderColor: '#e2e2dc', background: '#f2f2ee', color: 'transparent' };\n    if (checked) return { ...base, borderColor: '#3f5fd0', background: '#3f5fd0', color: '#fff' };\n    return { ...base, borderColor: '#cfcfc6', background: '#fff', color: 'transparent' };\n  }\n\n  renderVals() {\n    const s = this.state;\n    const canSubmit = s.want_report || s.want_transcript;\n    const recDisabled = !canSubmit;\n    const e = s.showErrors ? this.tier1() : {};\n\n    const META = {\n      report: { icon: '📄', label: 'Research Report', desc: 'Online research brief', action: 'Download .md' },\n      transcript: { icon: '📝', label: 'Interview Transcript', desc: 'Formatted transcript', action: 'Download .md' },\n      mindmap: { icon: '🗺️', label: 'Mind Map', desc: 'Miro board', action: 'Open Miro board ↗' },\n      recommendation: { icon: '💡', label: 'Recommendation', desc: 'Advisor summary', action: 'Download .md' },\n    };\n    const order = ['report', 'transcript', 'mindmap', 'recommendation'];\n    const artifacts = order.filter(k => s.artifacts[k]).map(k => {\n      const st = s.artifacts[k].state;\n      return {\n        key: k, icon: META[k].icon, label: META[k].label, desc: META[k].desc,\n        isGen: st === 'generating', isReady: st === 'ready', isFailed: st === 'failed',\n        actionText: META[k].action, retryText: k === 'mindmap' ? 'Retry mind map' : 'Retry',\n        showFailNote: st === 'failed' && k === 'mindmap',\n        onAction: () => this.download(k, META[k].label),\n        onRetry: this.retry(k),\n      };\n    });\n\n    const clarItems = s.pendingClar.map(c => ({ ...c, value: s.clarValues[c.key] || '', onInput: this.onClar(c.key) }));\n\n    const submitStyle = {\n      fontFamily: 'inherit', fontSize: '14px', fontWeight: 600, padding: '11px 20px', borderRadius: '9px', border: 'none',\n      color: '#fff', background: canSubmit ? '#3f5fd0' : '#c8c8c0', cursor: canSubmit ? 'pointer' : 'not-allowed',\n      boxShadow: canSubmit ? '0 1px 2px rgba(63,95,208,.3)' : 'none', transition: 'background .15s',\n    };\n    const recRowStyle = {\n      display: 'flex', alignItems: 'flex-start', gap: '12px', padding: '16px 18px',\n      cursor: recDisabled ? 'not-allowed' : 'pointer', userSelect: 'none',\n    };\n\n    return {\n      // state passthrough\n      want_report: s.want_report, want_transcript: s.want_transcript,\n      topic: s.topic, interview_purpose: s.interview_purpose, business_context: s.business_context,\n      participant_count: s.participant_count, project_goals: s.project_goals,\n      submitted: s.submitted, softBanner: s.softBanner,\n\n      // toggles / inputs\n      toggleReport: this.toggleReport, toggleTranscript: this.toggleTranscript,\n      toggleRec: this.toggleRec, toggleMindmap: this.toggleMindmap,\n      onTopic: this.onTopic, onPurpose: this.onPurpose, onContext: this.onContext,\n      onCount: this.onCount, onGoals: this.onGoals,\n\n      // checkboxes\n      reportBox: this.box(s.want_report, false),\n      transBox: this.box(s.want_transcript, false),\n      mindBox: this.box(s.want_mindmap, false),\n      recBox: this.box(s.want_recommendation, recDisabled),\n      recDisabled, recEnabled: !recDisabled,\n      recRowStyle, recCardDim: recDisabled ? 'opacity:.72' : '',\n\n      // errors\n      errTopic: e.topic || '',\n      errPurpose: e.purpose || '',\n      errContext: e.context || '',\n      errFile: s.fileError || (e.file || ''),\n\n      // file widget\n      filePresent: !!s.file, noFile: !s.file,\n      fileName: s.file ? s.file.name : '',\n      fileMeta: s.file ? (this.fmtSize(s.file.sizeMB) + ' · ' + (s.file.kind === 'text' ? 'Text transcript' : 'Audio')) : '',\n      fileIcon: s.file ? (s.file.kind === 'text' ? '📄' : '🎧') : '📄',\n      samples: [\n        { name: 'recording.m4a', mb: 12 }, { name: 'transcript.txt', mb: 0.3 },\n        { name: 'keynote.mp3', mb: 52 }, { name: 'notes.pdf', mb: 2 }, { name: 'blank.wav', mb: 0 },\n      ].map(x => ({ label: x.name + ' · ' + this.fmtSize(x.mb), onPick: () => this.applyFile(x.name, x.mb) })),\n\n      // clarifications\n      reportClars: clarItems.filter(c => c.section === 'report'),\n      transClars: clarItems.filter(c => c.section === 'transcript'),\n\n      // submit\n      onSubmit: this.onSubmit,\n      submitDisabled: !canSubmit,\n      submitTitle: canSubmit ? '' : 'Select Report or Transcript to continue.',\n      submitLabel: s.pendingClar.length ? 'Continue with these details' : 'Submit request',\n      submitHint: canSubmit ? '' : 'Select Report or Transcript to continue.',\n      submitStyle,\n\n      // results\n      artifacts,\n      resultsRef: el => { this.resultsEl = el; },\n\n      // hints\n      showHints: this.props.hints !== false,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
